<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>HIBS P2015 — Tränarapp</title>
  <!-- Bakgrund med rundade hörn -->
  <rect width="512" height="512" rx="80" fill="#0b0d14"/>

  <!-- Innebandyboll (cirkel + hål) -->
  <circle cx="256" cy="136" r="68" fill="rgba(34,197,94,0.07)" stroke="#22c55e" stroke-width="5"/>
  <!-- Centrum-hål -->
  <circle cx="256" cy="136" r="11" fill="#22c55e"/>
  <!-- Hål i ring-mönster -->
  <circle cx="220" cy="114" r="7" fill="#22c55e" opacity="0.75"/>
  <circle cx="292" cy="114" r="7" fill="#22c55e" opacity="0.75"/>
  <circle cx="220" cy="158" r="7" fill="#22c55e" opacity="0.75"/>
  <circle cx="292" cy="158" r="7" fill="#22c55e" opacity="0.75"/>
  <circle cx="256" cy="100" r="6" fill="#22c55e" opacity="0.5"/>
  <circle cx="256" cy="172" r="6" fill="#22c55e" opacity="0.5"/>

  <!-- Tunn separator -->
  <rect x="96" y="218" width="320" height="2" rx="1" fill="rgba(34,197,94,0.15)"/>

  <!-- HIBS text -->
  <text
    x="256" y="338"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-size="152"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
  >HIBS</text>

  <!-- P2015 -->
  <text
    x="256" y="406"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-size="48"
    font-weight="700"
    fill="#22c55e"
    text-anchor="middle"
    letter-spacing="7"
  >P2015</text>

  <!-- Grön bottenackord -->
  <rect x="96" y="432" width="320" height="5" rx="2.5" fill="#22c55e" opacity="0.3"/>
</svg>
